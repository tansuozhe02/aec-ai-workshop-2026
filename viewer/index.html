<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duplex.ifc — 3D Viewer</title>
<style>
  html,body{margin:0;height:100%;background:#13111c;color:#eee;font:14px system-ui,sans-serif;overflow:hidden}
  #c{position:fixed;inset:0;display:block}
  #hud{position:fixed;top:12px;left:12px;background:rgba(20,16,30,.82);padding:10px 14px;border-radius:10px;
       border:1px solid #7c3aed;max-width:280px;line-height:1.45}
  #hud b{color:#a78bfa}
  #status{position:fixed;bottom:12px;left:12px;background:rgba(20,16,30,.82);padding:8px 12px;border-radius:8px;
          font-variant-numeric:tabular-nums}
  .pill{display:inline-block;background:#2a2440;border-radius:6px;padding:1px 7px;margin:2px 3px 0 0;font-size:12px}
</style></head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <b>Duplex Apartment</b><br>
  buildingSMART sample · IFC2X3<br>
  <div style="margin-top:6px;color:#bbb">
    Drag = orbit · scroll = zoom · right-drag = pan
  </div>
  <div id="legend" style="margin-top:8px"></div>
</div>
<div id="status">booting…</div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { IfcAPI } from 'https://esm.sh/web-ifc@0.0.57';

const WASM = 'https://unpkg.com/web-ifc@0.0.57/';
const statusEl = document.getElementById('status');
const setStatus = t => statusEl.textContent = t;

// ---- three.js scene ----
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x13111c);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.1));
const dir = new THREE.DirectionalLight(0xffffff, 1.4); dir.position.set(8,18,12); scene.add(dir);
const root = new THREE.Group();
root.rotation.x = -Math.PI/2;          // IFC is Z-up -> make Y-up
scene.add(root);

function resize(){ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();
(function loop(){ controls.update(); renderer.render(scene,camera); requestAnimationFrame(loop); })();

// ---- load IFC via web-ifc ----
const api = new IfcAPI();
api.SetWasmPath(WASM, true);

const byColor = new Map();   // bucket triangles by color for fewer draw calls
function bucket(color){
  const key = `${color.x.toFixed(2)},${color.y.toFixed(2)},${color.z.toFixed(2)},${color.w.toFixed(2)}`;
  if(!byColor.has(key)) byColor.set(key, {color, pos:[], idx:[], n:0});
  return byColor.get(key);
}

async function run(){
  setStatus('loading engine…');
  await api.Init();
  setStatus('fetching Duplex.ifc…');
  const buf = new Uint8Array(await (await fetch('/building/Duplex.ifc')).arrayBuffer());
  setStatus('parsing model…');
  const modelID = api.OpenModel(buf);

  setStatus('building geometry…');
  let meshCount = 0;
  api.StreamAllMeshes(modelID, (mesh)=>{
    const geos = mesh.geometries;
    for(let i=0;i<geos.size();i++){
      const pg = geos.get(i);
      const g = api.GetGeometry(modelID, pg.geometryExpressID);
      const verts = api.GetVertexArray(g.GetVertexData(), g.GetVertexDataSize());   // interleaved pos+normal (6)
      const idx = api.GetIndexArray(g.GetIndexData(), g.GetIndexDataSize());
      const m = pg.flatTransformation;   // 16
      const b = bucket(pg.color);
      const base = b.n;
      for(let v=0; v<verts.length; v+=6){
        const x=verts[v], y=verts[v+1], z=verts[v+2];
        // apply 4x4 (column-major) transform
        b.pos.push(
          m[0]*x + m[4]*y + m[8]*z  + m[12],
          m[1]*x + m[5]*y + m[9]*z  + m[13],
          m[2]*x + m[6]*y + m[10]*z + m[14]
        );
        b.n++;
      }
      for(let k=0;k<idx.length;k++) b.idx.push(base + idx[k]);
      g.delete();
    }
    meshCount++;
  });

  // assemble three meshes per color bucket
  let tris = 0;
  for(const {color,pos,idx} of byColor.values()){
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    const mat = new THREE.MeshStandardMaterial({
      color:new THREE.Color(color.x,color.y,color.z),
      transparent: color.w < 1, opacity: color.w, side: THREE.DoubleSide,
      roughness:.85, metalness:.0
    });
    root.add(new THREE.Mesh(geo,mat));
    tris += idx.length/3;
  }

  // frame the model
  const box = new THREE.Box3().setFromObject(root);
  const size = box.getSize(new THREE.Vector3()), center = box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  const d = Math.max(size.x,size.y,size.z);
  camera.position.set(center.x + d*0.9, center.y + d*0.8, center.z + d*1.1);
  camera.near = d/100; camera.far = d*20; camera.updateProjectionMatrix();

  // legend
  document.getElementById('legend').innerHTML =
    `<span class="pill">${meshCount} objects</span><span class="pill">${tris.toLocaleString()} triangles</span>`;
  setStatus(`loaded · ${meshCount} objects · ${tris.toLocaleString()} triangles`);
  api.CloseModel(modelID);
}
run().catch(e=>{ console.error(e); setStatus('error: '+e.message); });
</script>
</body></html>
